name = "ton-bridge-notifications"
main = "index.js"
compatibility_date = "2024-01-01"

# Cron trigger — runs every 60 seconds
[triggers]
crons = ["* * * * *"]

# KV namespace (create with: wrangler kv:namespace create BRIDGE_KV)
[[kv_namespaces]]
binding = "BRIDGE_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Secrets (set with: wrangler secret put TELEGRAM_BOT_TOKEN)
# TELEGRAM_BOT_TOKEN
# CHANGENOW_API_KEY
