name = "ton-bridge-auth"
main = "src/index.js"
compatibility_date = "2024-01-01"

# Cron triggers:
# - every minute for status notification polling
# - daily at 09:00 UTC for leaderboard digest
[triggers]
crons = ["* * * * *", "0 9 * * *"]

# KV namespace (create with: wrangler kv:namespace create BRIDGE_KV)
[[kv_namespaces]]
binding = "BRIDGE_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# KV namespace for leaderboard opt-in flags.
# Create with: wrangler kv:namespace create LEADERBOARD_KV
[[kv_namespaces]]
binding = "LEADERBOARD_KV"
id = "REPLACE_WITH_LEADERBOARD_KV_NAMESPACE_ID"

# KV namespace for the accrual cursor.
# Create with: wrangler kv:namespace create ACCRUAL_KV
[[kv_namespaces]]
binding = "ACCRUAL_KV"
id = "REPLACE_WITH_ACCRUAL_KV_NAMESPACE_ID"

# D1 database binding (created with: wrangler d1 create ton-bridge-affiliate)
[[d1_databases]]
binding = "DB"
database_name = "ton-bridge-affiliate"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

# Rate limiter: 30 requests / minute / IP
# See https://developers.cloudflare.com/workers/runtime-apis/bindings/rate-limit/
[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1401"

  [ratelimits.simple]
  limit = 30
  period = 60

[vars]
# Non-secret configuration can go here.
# Secrets (BOT_TOKEN, JWT_SECRET, CHANGENOW_API_KEY, LEADERBOARD_CHANNEL_ID) must be set via:
#   wrangler secret put BOT_TOKEN
#   wrangler secret put JWT_SECRET
#   wrangler secret put CHANGENOW_API_KEY
#   wrangler secret put LEADERBOARD_CHANNEL_ID
#   wrangler secret put ADMIN_SECRET
#   wrangler secret put TONBANKCARD_API_KEY

# Rate knobs (issue #55, Phase 6.12)
# All values are validated on boot; cashback_bps + referral_bps must <= service_bps.
# Use POST /admin/config to schedule runtime changes without a redeploy.
SERVICE_BPS = "40"
CASHBACK_BPS = "10"
REFERRAL_BPS = "10"
POINT_USD_VALUE = "0.00003"
POINTS_PER_TBC = "10"
MIN_REDEEM_POINTS = "100"
DAILY_TURNOVER_CAP_USD = "50000"
