                    </ul>
                    <!-- * community section -->
                    <!-- * menu -->
                </div>
            </div>
        </div>

    <script>
        // Tab-bar taps
        document.querySelectorAll('.appBottomMenu .item').forEach(function (el) {
            el.addEventListener('click', function () { haptic.impact('light'); });
        });
    </script>
    <!-- Telegram Theme Integration -->
    <script src="assets/js/tg-theme.js"></script>

    <script>
        // Wire community links after translations are applied (keeps href in sync with locale)
        document.addEventListener('i18n:applied', function(e) {
            var t = e.detail.t;
            var groupLink = document.getElementById('community-group-link');
            var chatLink = document.getElementById('community-chat-link');
            if (groupLink && t.community_group_link) {
                groupLink.href = "javascript:Telegram.WebApp.openTelegramLink('" + t.community_group_link + "');";
            }
            if (chatLink && t.community_chat_link) {
                chatLink.href = "javascript:Telegram.WebApp.openTelegramLink('" + t.community_chat_link + "');";
            }
        });

        // Initialise i18n on boot, then sync the language switch state with the
        // current language so toggling it actually switches via i18n.setLang.
        i18n.init().then(function () {
            var langSwitch = document.getElementById('languageSwitch');
            if (langSwitch) {
                langSwitch.checked = i18n.getLang() === 'ru';
                langSwitch.addEventListener('change', function () {
                    i18n.setLang(this.checked ? 'ru' : 'en');
                });
            }
        });
    </script>
