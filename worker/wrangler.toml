name = "ton-bridge-leaderboard"
main = "leaderboard.js"
compatibility_date = "2024-01-01"

[triggers]
crons = ["0 9 * * *"]

# KV namespace for opt-in flags.
# Create with: wrangler kv:namespace create LEADERBOARD_KV
# Then paste the returned id below.
[[kv_namespaces]]
binding = "LEADERBOARD_KV"
id      = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# Secrets — set with:
#   wrangler secret put BOT_TOKEN
#   wrangler secret put LEADERBOARD_CHANNEL_ID
#   wrangler secret put CHANGENOW_API_KEY
