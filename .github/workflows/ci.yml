name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  i18n-check:
    name: i18n Key Parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check i18n key parity
        run: npm run check:i18n

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: i18n-check
    steps:
      - uses: actions/checkout@v4

      - name: Read .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build
        env:
          TG_ANALYTICS_TOKEN: ${{ secrets.TG_ANALYTICS_TOKEN }}
          TG_ANALYTICS_APP_NAME: ${{ secrets.TG_ANALYTICS_APP_NAME }}
          YANDEX_METRIKA_ID: ${{ secrets.YANDEX_METRIKA_ID }}
          CHANGENOW_LINK_ID: ${{ secrets.CHANGENOW_LINK_ID }}
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_RELEASE: ${{ github.sha }}
          SENTRY_ENVIRONMENT: production

      - name: Upload sourcemaps to Sentry
        if: env.SENTRY_AUTH_TOKEN != ''
        run: |
          npx @sentry/cli releases new "${{ github.sha }}"
          npx @sentry/cli releases files "${{ github.sha }}" upload-sourcemaps dist/ --url-prefix '~/'
          npx @sentry/cli releases finalize "${{ github.sha }}"
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

  validate-manifest:
    name: Validate PWA Manifest
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Read .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build
        env:
          TG_ANALYTICS_TOKEN: ${{ secrets.TG_ANALYTICS_TOKEN }}
          TG_ANALYTICS_APP_NAME: ${{ secrets.TG_ANALYTICS_APP_NAME }}
          YANDEX_METRIKA_ID: ${{ secrets.YANDEX_METRIKA_ID }}
          CHANGENOW_LINK_ID: ${{ secrets.CHANGENOW_LINK_ID }}
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_RELEASE: ${{ github.sha }}
          SENTRY_ENVIRONMENT: production

      - name: Validate PWA manifest
        run: npm run validate:manifest

  schema-smoke-test:
    name: Affiliate Schema Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run affiliate schema smoke tests
        run: npm run test:schema

  auth-verify-test:
    name: Auth-Verify Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run auth-verify unit tests
        run: npm run test:auth-verify

  accrual-unit-tests:
    name: Accrual Job Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run accrual job unit tests
        run: npm run test:accrual

  rate-config-unit-tests:
    name: Rate Config Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run rate config unit tests
        run: npm run test:rate-config

  php-installer-tests:
    name: PHP Installer Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, openssl, pdo_mysql

      - name: Run installer tests
        run: php tests/installer.test.php && php tests/installer-navigation.test.php

  html-validate:
    name: HTML Validate
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Read .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build
        env:
          TG_ANALYTICS_TOKEN: ${{ secrets.TG_ANALYTICS_TOKEN }}
          TG_ANALYTICS_APP_NAME: ${{ secrets.TG_ANALYTICS_APP_NAME }}
          YANDEX_METRIKA_ID: ${{ secrets.YANDEX_METRIKA_ID }}
          CHANGENOW_LINK_ID: ${{ secrets.CHANGENOW_LINK_ID }}
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_RELEASE: ${{ github.sha }}
          SENTRY_ENVIRONMENT: production

      - name: Validate HTML
        run: npx html-validate "dist/*.html"

  playwright:
    name: Playwright Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Read .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build
        env:
          TG_ANALYTICS_TOKEN: ${{ secrets.TG_ANALYTICS_TOKEN }}
          TG_ANALYTICS_APP_NAME: ${{ secrets.TG_ANALYTICS_APP_NAME }}
          YANDEX_METRIKA_ID: ${{ secrets.YANDEX_METRIKA_ID }}
          CHANGENOW_LINK_ID: ${{ secrets.CHANGENOW_LINK_ID }}
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_RELEASE: ${{ github.sha }}
          SENTRY_ENVIRONMENT: production

      - name: Run Playwright tests
        run: npm test
        env:
          TG_ANALYTICS_TOKEN: ${{ secrets.TG_ANALYTICS_TOKEN }}
          TG_ANALYTICS_APP_NAME: ${{ secrets.TG_ANALYTICS_APP_NAME }}
          YANDEX_METRIKA_ID: ${{ secrets.YANDEX_METRIKA_ID }}
          CHANGENOW_LINK_ID: ${{ secrets.CHANGENOW_LINK_ID }}
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_RELEASE: ${{ github.sha }}
          SENTRY_ENVIRONMENT: production

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: tests/screenshots/

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Read .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build
        env:
          TG_ANALYTICS_TOKEN: ${{ secrets.TG_ANALYTICS_TOKEN }}
          TG_ANALYTICS_APP_NAME: ${{ secrets.TG_ANALYTICS_APP_NAME }}
          YANDEX_METRIKA_ID: ${{ secrets.YANDEX_METRIKA_ID }}
          CHANGENOW_LINK_ID: ${{ secrets.CHANGENOW_LINK_ID }}
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_RELEASE: ${{ github.sha }}
          SENTRY_ENVIRONMENT: production

      - name: Run Lighthouse CI
        run: npx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build, html-validate, validate-manifest]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Read .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build
        env:
          TG_ANALYTICS_TOKEN: ${{ secrets.TG_ANALYTICS_TOKEN }}
          TG_ANALYTICS_APP_NAME: ${{ secrets.TG_ANALYTICS_APP_NAME }}
          YANDEX_METRIKA_ID: ${{ secrets.YANDEX_METRIKA_ID }}
          CHANGENOW_LINK_ID: ${{ secrets.CHANGENOW_LINK_ID }}
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_RELEASE: ${{ github.sha }}
          SENTRY_ENVIRONMENT: production

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
